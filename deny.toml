# cargo-deny configuration (supply-chain + license gates).
[advisories]
version = 2
yanked = "deny"

[bans]
multiple-versions = "warn"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # webpki-roots (the Mozilla CA bundle, pulled in by rustls) ships under CDLA-Permissive-2.0 — a
    # permissive data license; fine for a TLS root store.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
