name    = "rails-pwa"
display = "Rails 8 + PWA"

# Merged into bootstrap's `mise use -g …`; the framework always also installs node (validation infra).
[toolchain]
ruby = "3.3"

# Executed at RUNTIME by the generic bin/new-app (at instance creation), as the service user, in the
# app dir, with LILA_INSTANCE/APP_DIR/APP_PORT/LILA_DOMAIN/SKIP_AUTH/SERVICE_USER/MISE in env. Full
# bash: conditionals, sed/awk post-tweaks, idempotency guards.
[scaffold]
script = "scaffold.sh"

# Templated into deploy/lila-app@.service's ExecStart + Environment lines. The command is portable:
# bin/new-app prefixes the mise wrapper for the systemd unit; the eval probe runs it directly. It
# binds localhost and reads ${APP_PORT} from the environment.
[serve]
exec = "bin/rails server -b ${APP_HOST} -p ${APP_PORT}"
# Process environment for the serve unit (rendered as systemd `Environment=` lines).
env = { RAILS_ENV = "development" }

# Drives the eval graders (§E) AND is quoted into the prompts so agents know the restart rules.
[validate]
test_cmd    = "bin/rails test"
health_path = "/up"
# Failure-tolerant pre-boot step the eval probe runs before serving (creates the dev SQLite DBs).
prepare     = "bin/rails db:prepare"

# Spliced verbatim into the agent prompts; the only stack-specific prose. Any design guidance this
# stack wants its workers to follow lives in worker.md as prose — design is a framework-generic concern,
# not part of the stack contract.
[prompt]
worker  = "worker.md"
manager = "manager.md"
