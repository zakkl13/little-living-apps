name    = "rails-pwa"
display = "Rails 8 + PWA"

# App toolchain pin for legacy host installs; the Docker image already includes Ruby.
[toolchain]
ruby = "3.3"

# Executed at runtime by lila-new-app in the app dir, with
# LILA_INSTANCE/APP_DIR/APP_PORT/LILA_DOMAIN/SKIP_AUTH/SERVICE_USER/MISE in env. Full bash:
# conditionals, sed/awk post-tweaks, idempotency guards.
[scaffold]
script = "scaffold.sh"

# Portable serve command. Docker runs it directly; legacy systemd wraps it with mise; eval runs it
# directly. APP_HOST is 0.0.0.0 in Docker and 127.0.0.1 for host/private probes.
[serve]
exec = "bin/rails server -b ${APP_HOST} -p ${APP_PORT}"
# Process environment for the app process.
env = { RAILS_ENV = "development" }

# Drives the eval graders (§E) AND is quoted into the prompts so agents know the restart rules.
[validate]
test_cmd    = "bin/rails test"
health_path = "/up"
# Failure-tolerant pre-boot step the eval probe runs before serving (creates the dev SQLite DBs).
prepare     = "bin/rails db:prepare"

# Spliced verbatim into the agent prompts; the only stack-specific prose. Any design guidance this
# stack wants its workers to follow lives in worker.md as prose — design is a framework-generic concern,
# not part of the stack contract.
[prompt]
worker  = "worker.md"
manager = "manager.md"
