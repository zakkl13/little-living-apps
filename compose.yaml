services:
  manager:
    container_name: ${LILA_INSTANCE:-primary}-manager
    build:
      context: .
    image: ${LILA_IMAGE:-lila-rs:dockerize}
    command: ["lila", "run"]
    env_file:
      - ${LILA_ENV_FILE:-.env}
    environment:
      LILA_INSTANCE: ${LILA_INSTANCE:-primary}
      LILA_ASSETS_DIR: /opt/lila
      WORKSPACE_DIR: /workspace
      MEMORY_DIR: /var/lib/lila/memory
      MANAGER_STATE_DIR: /var/lib/lila/state
      CODEX_HOME: /var/lib/lila/codex
      CODEX_SANDBOX_MODE: ${CODEX_SANDBOX_MODE:-danger-full-access}
      LILA_APP_RESTART_CMD: ${LILA_APP_RESTART_CMD:-docker compose restart app}
      LILA_APP_URL: http://app:${APP_PORT:-3000}
      APP_PORT: ${APP_PORT:-3000}
      INSPECTOR_HOST: ${INSPECTOR_HOST:-0.0.0.0}
      INSPECTOR_PORT: ${INSPECTOR_PORT:-9090}
    volumes:
      - workspace:/workspace
      - memory:/var/lib/lila/memory
      - state:/var/lib/lila/state
      - codex-home:/var/lib/lila/codex
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    depends_on:
      - app

  app:
    container_name: ${LILA_INSTANCE:-primary}-app
    image: ${LILA_IMAGE:-lila-rs:dockerize}
    env_file:
      - ${LILA_ENV_FILE:-.env}
    environment:
      LILA_INSTANCE: ${LILA_INSTANCE:-primary}
      LILA_ASSETS_DIR: /opt/lila
      WORKSPACE_DIR: /workspace
      APP_PORT: ${APP_PORT:-3000}
      APP_HOST: 0.0.0.0
      BUNDLE_APP_CONFIG: /workspace/.bundle
      BUNDLE_PATH: /workspace/vendor/bundle
      PORT: ${APP_PORT:-3000}
    working_dir: /workspace
    command:
      - bash
      - -c
      - |
        lila-new-app
        eval "$$(cd /opt/lila && lila stack "$${LILA_STACK:-rails-pwa}")"
        while IFS= read -r kv; do
          [ -n "$$kv" ] && export "$$kv"
        done <<< "$$LILA_STACK_SERVE_ENV"
        exec bash -c "$$LILA_STACK_SERVE_EXEC"
    volumes:
      - workspace:/workspace
    expose:
      - "${APP_PORT:-3000}"
    ports:
      - "${APP_BIND:-127.0.0.1}:${APP_PORT:-3000}:${APP_PORT:-3000}"
    restart: unless-stopped

  caddy:
    container_name: ${LILA_INSTANCE:-primary}-caddy
    image: caddy:2
    profiles: ["caddy"]
    env_file:
      - ${LILA_ENV_FILE:-.env}
    environment:
      LILA_DOMAIN: ${LILA_DOMAIN:-}
      APP_PORT: ${APP_PORT:-3000}
      INSPECTOR_PORT: ${INSPECTOR_PORT:-9090}
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/Caddyfile
      - --adapter
      - caddyfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - app
      - manager
    restart: unless-stopped

volumes:
  workspace:
    name: ${LILA_INSTANCE:-primary}-workspace
    external: true
  memory:
    name: ${LILA_INSTANCE:-primary}-memory
    external: true
  state:
    name: ${LILA_INSTANCE:-primary}-state
    external: true
  codex-home:
    name: ${LILA_INSTANCE:-primary}-codex-home
    external: true
  caddy-data:
    name: ${LILA_INSTANCE:-primary}-caddy-data
    external: true
  caddy-config:
    name: ${LILA_INSTANCE:-primary}-caddy-config
    external: true
