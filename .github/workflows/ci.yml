name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push the badge JSON to the orphan `badges` branch (main only)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Core coverage gate (≥ 78%)
        run: scripts/coverage.sh check 78
      - name: Publish badge to `badges` branch
        if: github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          scripts/coverage.sh badge > /tmp/coverage.json    # cheap: reuses the profile from the gate
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Single-file orphan branch, force-pushed each run — keeps badge data off main's history.
          git checkout --orphan badges-tmp
          git reset --hard
          cp /tmp/coverage.json coverage.json
          git add -f coverage.json
          git commit -m "ci: update coverage badge [skip ci]"
          git push -f origin badges-tmp:badges

  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lizard
        run: pip install lizard
      - name: Cyclomatic complexity ≤ 6
        run: scripts/check-complexity.sh

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
      - name: cargo-audit
        run: |
          cargo install cargo-audit --locked
          cargo audit
